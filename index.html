<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momos — Pricing Defense Decision Tree</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #faf6f1; --bg-warm: #f5efe8; --bg-white: #ffffff; --card: #ffffff;
    --border: #e8e0d6; --border-light: #f0ead3;
    --red: #e04a3c; --red-light: #fdf0ee; --red-border: #f5ccc7;
    --green: #1a8a5c; --green-light: #edf8f2; --green-border: #c4e8d6;
    --amber: #c47b17; --amber-light: #fef8ec; --amber-border: #f5deb0;
    --blue: #2d6fba; --blue-light: #eef4fb; --blue-border: #bdd4f0;
    --purple: #7c3aed; --purple-light: #f5f0ff; --purple-border: #d4c1f7;
    --gray: #9a918a;
    --text: #1a1a1a; --text-secondary: #5c5650; --text-dim: #9a918a;
    --mono: 'JetBrains Mono', monospace; --sans: 'DM Sans', sans-serif;
    --radius: 12px; --radius-sm: 8px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.03);
    --shadow: 0 2px 8px rgba(0,0,0,.05), 0 1px 3px rgba(0,0,0,.04);
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  .header { background: var(--bg-white); border-bottom: 1px solid var(--border); padding: 20px 32px 0; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; gap: 14px; margin-bottom: 4px; }
  .logo { width: 34px; height: 34px; border-radius: 8px; background: var(--red); display: flex; align-items: center; justify-content: center; font-size: 17px; line-height: 1; box-shadow: 0 2px 8px rgba(224,74,60,.2); }
  .header-meta { font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .14em; }
  h1 { font-size: 22px; font-weight: 800; letter-spacing: -.02em; color: var(--text); line-height: 1.2; }
  .header-sub { color: var(--text-secondary); font-size: 13px; margin: 4px 0 14px; font-weight: 400; }

  .tabs { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { border: none; background: transparent; padding: 10px 14px; cursor: pointer; color: var(--text-dim); font-family: var(--sans); font-size: 13px; font-weight: 600; transition: all .15s; white-space: nowrap; border-bottom: 2px solid transparent; }
  .tab:hover { color: var(--text-secondary); }
  .tab.active { color: var(--red); border-bottom-color: var(--red); }

  .content { max-width: 920px; margin: 24px auto; padding: 0 28px 60px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .principle { border-radius: var(--radius); padding: 18px 20px; margin-bottom: 20px; border: 1px solid; }
  .principle .p-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .principle p { color: var(--text-secondary); font-size: 13px; line-height: 1.7; }
  .principle em { color: var(--text); font-style: normal; font-weight: 600; }

  .must-have { border-radius: var(--radius); padding: 16px 18px; margin-bottom: 20px; background: var(--red-light); border: 1px solid var(--red-border); }
  .mh-title { font-weight: 800; font-size: 14px; color: var(--red); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .04em; }
  .mh-row { padding: 10px 0; border-top: 1px solid var(--red-border); display: flex; gap: 10px; align-items: flex-start; }
  .mh-icon { font-size: 14px; flex-shrink: 0; margin-top: 2px; }
  .mh-row p { font-size: 13px; line-height: 1.7; color: var(--text-secondary); }

  .section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow-sm); }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; transition: background .15s; }
  .section-header:hover { background: var(--bg-warm); }
  .section-header.open { border-bottom: 1px solid var(--border); }
  .section-title { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; color: var(--text); }
  .section-icon { font-size: 15px; width: 26px; height: 26px; border-radius: 6px; background: var(--bg-warm); display: inline-flex; align-items: center; justify-content: center; }
  .chevron { font-size: 14px; transition: transform .2s; color: var(--text-dim); }
  .chevron.open { transform: rotate(180deg); }
  .section-body { padding: 18px; display: none; }
  .section-body.open { display: block; }

  .d-question { background: var(--amber-light); border: 1px solid var(--amber-border); border-radius: var(--radius-sm); padding: 12px 16px; }
  .d-question p { font-weight: 600; font-size: 13px; color: var(--amber); }
  .d-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0 16px; }
  .d-branch { border-radius: var(--radius-sm); padding: 14px 16px; border: 1px solid; }
  .d-branch.yes, .d-branch.no-y { background: var(--green-light); border-color: var(--green-border); }
  .d-branch.no, .d-branch.no-n { background: var(--red-light); border-color: var(--red-border); }
  .d-branch.no-p { background: var(--purple-light); border-color: var(--purple-border); }
  .d-branch.no-a { background: var(--amber-light); border-color: var(--amber-border); }
  .b-label { font-weight: 700; font-size: 12px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .03em; }
  .d-branch p { font-size: 12.5px; line-height: 1.6; color: var(--text-secondary); }

  .script { background: var(--blue-light); border: 1px solid var(--blue-border); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 8px; }
  .script-label { font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
  .script p { font-size: 12.5px; line-height: 1.7; color: var(--text-secondary); font-style: italic; }

  .tactic { background: var(--bg-warm); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 8px; }
  .t-title { font-weight: 700; font-size: 13px; color: var(--red); margin-bottom: 4px; }
  .tactic p { font-size: 12.5px; line-height: 1.7; color: var(--text-secondary); }

  .body-text { font-size: 13px; line-height: 1.7; color: var(--text-secondary); margin-bottom: 14px; }

  .sub-heading { font-weight: 700; font-size: 14px; margin: 18px 0 10px; }

  .cards-2, .cards-3 { display: grid; gap: 8px; margin-bottom: 12px; }
  .cards-2 { grid-template-columns: 1fr 1fr; }
  .cards-3 { grid-template-columns: 1fr 1fr 1fr; }
  .stat-card { border-radius: var(--radius-sm); padding: 14px 16px; border: 1px solid; }
  .sc-val { font-family: var(--mono); font-weight: 700; font-size: 22px; line-height: 1; margin-bottom: 4px; }
  .sc-label { font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: .03em; margin-bottom: 6px; }
  .sc-note { font-size: 12px; line-height: 1.6; color: var(--text-secondary); }

  .step-flow { display: flex; align-items: stretch; gap: 8px; margin-bottom: 16px; }
  .sf-step { flex: 1; border-radius: var(--radius-sm); padding: 14px 16px; border: 1px solid var(--border); background: var(--card); }
  .sf-step.active { border-color: var(--green-border); background: var(--green-light); }
  .sf-step.fallback { border-color: var(--amber-border); background: var(--amber-light); }
  .sf-step.escalate { border-color: var(--red-border); background: var(--red-light); }
  .sf-num { font-family: var(--mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .sf-text { font-weight: 700; font-size: 13px; color: var(--text); margin-bottom: 6px; }
  .sf-note { font-size: 11.5px; line-height: 1.6; color: var(--text-secondary); }
  .sf-arrow { display: flex; align-items: center; font-size: 18px; color: var(--text-dim); flex-shrink: 0; }

  .trade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .trade-item { border-radius: var(--radius-sm); padding: 12px 16px; border: 1px solid var(--border); background: var(--card); }
  .ti-label { font-weight: 700; font-size: 12px; margin-bottom: 4px; color: var(--text); }
  .ti-earn { font-size: 12px; line-height: 1.5; color: var(--text-secondary); }

  .never-list { display: flex; flex-direction: column; gap: 6px; }
  .n-item { display: flex; gap: 8px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border-light); }
  .n-icon { color: var(--red); font-weight: 700; flex-shrink: 0; }
  .n-text { font-size: 12.5px; line-height: 1.6; color: var(--text-secondary); }

  .esc-row { display: flex; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-light); }
  .esc-badge { font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 6px; white-space: nowrap; letter-spacing: .04em; border: 1px solid; }
  .esc-info { flex: 1; }
  .esc-trigger { font-weight: 700; font-size: 13px; color: var(--text); }
  .esc-who { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .code-block { background: var(--bg-warm); border-radius: var(--radius-sm); padding: 14px 16px; font-family: var(--mono); font-size: 12px; line-height: 2; color: var(--text-secondary); margin-bottom: 12px; }
  .code-block span { font-weight: 700; color: var(--text); }

  .waterfall { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; padding: 16px; background: var(--bg-warm); border-radius: var(--radius-sm); margin-bottom: 12px; }
  .wf-step { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; font-size: 12px; font-weight: 600; color: var(--text); }
  .wf-arrow { color: var(--text-dim); font-size: 14px; }

  table.tier-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 12px; }
  .tier-table th { background: var(--bg-warm); padding: 8px 10px; text-align: left; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-dim); border-bottom: 2px solid var(--border); }
  .tier-table td { padding: 10px; border-bottom: 1px solid var(--border-light); color: var(--text-secondary); }
  .tier-table tr.recommended { background: var(--purple-light); }
  .badge { font-family: var(--mono); font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 4px; letter-spacing: .06em; }

  .quarterly-box { background: var(--red-light); border: 1px solid var(--red-border); border-radius: var(--radius-sm); padding: 16px; }
  .qb-title { font-weight: 700; font-size: 13px; color: var(--red); margin-bottom: 10px; }
  .qb-stats { display: flex; gap: 16px; margin-bottom: 10px; }
  .qb-stat { flex: 1; }
  .qs-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim); margin-bottom: 2px; }
  .qs-val { font-family: var(--mono); font-weight: 700; font-size: 16px; color: var(--red); }
  .qb-note { font-size: 12px; line-height: 1.6; color: var(--text-secondary); }

  .loading { text-align: center; padding: 80px 20px; }
  .loading-spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { margin-top: 16px; color: var(--text-dim); font-size: 14px; }
  .error { text-align: center; padding: 60px 20px; color: var(--red); }
  .error h2 { margin-bottom: 8px; }
  .error p { color: var(--text-secondary); font-size: 14px; max-width: 500px; margin: 0 auto; }

  @media (max-width: 700px) {
    .cards-3 { grid-template-columns: 1fr; }
    .cards-2, .d-grid, .trade-grid { grid-template-columns: 1fr; }
    .step-flow { flex-direction: column; }
    .sf-arrow { transform: rotate(90deg); align-self: center; }
    .qb-stats { flex-direction: column; }
    .content { padding: 0 16px 40px; }
    .header { padding: 16px 16px 0; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">🍊</div>
    <div>
      <div class="header-meta">Momos · Sales Playbook · Internal Only</div>
      <h1>Pricing Defense Decision Tree</h1>
    </div>
  </div>
  <p class="header-sub">Hold price. Defend fees. Close without unnecessary concessions.</p>
  <div class="tabs" id="tabs"></div>
</div>

<div class="content" id="content"></div>

<script>

const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRJaprMHaCx6T3ouBZ8z4n9iKKAiT2TgwxrT_xrC7blbOvNnpktkoKcJAZivQ_qIdi9M_ykJZC37Mxz/pub?gid=1755976303&single=true&output=csv';
const EMBEDDED_DATA = [{"tab": "Global Rules", "section": "Rules That Apply to Every Deal", "type": "warning", "icon": "", "color": "red", "label": "Annual contracts only.", "value": "", "text": "We do not offer monthly or quarterly billing. Any non-annual payment structure requires special approval from Sai."}, {"tab": "Global Rules", "section": "Rules That Apply to Every Deal", "type": "warning", "icon": "", "color": "red", "label": "7% annual price increase is standard.", "value": "", "text": "Every renewal includes a 7% annual increase. A customer can negotiate this down to the 3-7% range but never to 0%. The price increase clause cannot be removed from the contract. On multi-year renewals the customer takes a one-time increase (3-7%) then locks that new rate for the term with no further increases."}, {"tab": "Global Rules", "section": "Rules That Apply to Every Deal", "type": "warning", "icon": "", "color": "red", "label": "We are moving away from free trials.", "value": "", "text": "Instead we offer structured onboarding with built-in risk protection. For Mid-Market: pay upfront with a 3-month contract opt-out available if needed. For Enterprise: see the onboarding path below."}, {"tab": "Global Rules", "section": "Enterprise Onboarding Path", "type": "body", "icon": "🏢", "color": "", "label": "", "value": "", "text": "Enterprise customers don't get free trials - they get structured onboarding paths. Always start with Option 1 and exhaust it fully before moving down. Each option requires more from us so treat downward movement as a real concession."}, {"tab": "Global Rules", "section": "Enterprise Onboarding Path", "type": "option", "icon": "", "color": "green", "label": "Option 1 - Highly Preferred", "value": "Implementation Fee + Billing Starts", "text": "Full commitment. They pay the implementation fee and subscription billing begins immediately. This is the standard and where 90%+ of deals should land."}, {"tab": "Global Rules", "section": "Enterprise Onboarding Path", "type": "option", "icon": "", "color": "amber", "label": "Option 2 - Fallback Only", "value": "Implementation Fee + 3-Month Opt-Out", "text": "They sign an annual contract and billing starts but can opt out within 90 days. They pay for the time used (e.g. opt out on day 90 = pay for 90 days remaining year refunded). Implementation fee is non-refundable. Only offer after fully exploring Option 1."}, {"tab": "Global Rules", "section": "Enterprise Onboarding Path", "type": "option", "icon": "", "color": "red", "label": "Option 3 - Largest Enterprise Only", "value": "Implementation Fee + Unpaid Pilot", "text": "Reserved for only our largest enterprise clients. Even then not preferred. They pay the implementation fee but get an unpaid pilot before subscription billing begins. Requires Sai approval."}, {"tab": "Global Rules", "section": "Enterprise Onboarding Path", "type": "script", "icon": "", "color": "", "label": "Script - Presenting Option 1", "value": "", "text": "Our standard onboarding is straightforward - you pay the implementation fee to get everything set up and billing starts on the same timeline. This is how we get you to value fastest and it's how the vast majority of our enterprise customers start."}, {"tab": "Global Rules", "section": "Enterprise Onboarding Path", "type": "script", "icon": "", "color": "", "label": "Script - Falling Back to Option 2", "value": "", "text": "I understand the hesitation. Here's what I can do - you sign the annual contract and billing starts as normal but I'll build in a 3-month opt-out window. If within the first 90 days you decide this isn't the right fit you only pay for the time you've used and the remaining year is refunded. The implementation fee stays because the work is already done at that point. That way you get the full platform experience with real skin in the game but you're not locked in for 12 months if it's not working."}, {"tab": "Global Rules", "section": "Enterprise Onboarding Path", "type": "script", "icon": "", "color": "", "label": "Script - Escalating to Option 3", "value": "", "text": "Let me take this to our CEO - for accounts at your scale he has the ability to structure a pilot where we cover the subscription cost for a defined period while you evaluate. You'd still pay the implementation fee since that covers real engineering time but the subscription risk is on us. I'll need 24 hours to get this approved. Fair?"}, {"tab": "Global Rules", "section": "Mid-Market Onboarding Path", "type": "body", "icon": "🏪", "color": "", "label": "", "value": "", "text": "Mid-Market onboarding paths."}, {"tab": "Global Rules", "section": "Mid-Market Onboarding Path", "type": "stat", "icon": "", "color": "green", "label": "Standard: Pay Upfront", "value": "", "text": "Customer pays upfront (implementation + subscription). Annual contract billing starts immediately. This is the default for all mid-market deals."}, {"tab": "Global Rules", "section": "Mid-Market Onboarding Path", "type": "stat", "icon": "", "color": "amber", "label": "Secondary: 3-Month Opt-Out", "value": "", "text": "If the customer asks for a pilot or free trial offer the 3-month contract opt-out instead. They sign the annual contract billing starts but they can opt out within 90 days - paying only for the time used with the remaining year refunded. Implementation fee is non-refundable."}, {"tab": "Global Rules", "section": "Mid-Market Onboarding Path", "type": "script", "icon": "", "color": "", "label": "Script - Standard Pay Upfront", "value": "", "text": "Our standard is straightforward - you sign the annual contract pay upfront and we go all-in on getting you live. Implementation onboarding CSM assignment - everything starts immediately."}, {"tab": "Global Rules", "section": "Mid-Market Onboarding Path", "type": "script", "icon": "", "color": "", "label": "Script - 3-Month Opt-Out (When They Ask for a Trial)", "value": "", "text": "We're moving away from free trials because they don't give you the real experience. Instead here's what I can offer: you sign the annual contract and billing starts but you have a 3-month opt-out window. If within 90 days you decide this isn't the right fit you only pay for the time you've used - we refund the rest. That way you're getting the full platform with full onboarding and full CSM support not a watered-down trial. You'll know within 90 days whether this is working."}, {"tab": "Global Rules", "section": "7% Annual Price Increase - Rules & Defense", "type": "body", "icon": "📈", "color": "", "label": "", "value": "", "text": "7% annual price increase rules and defense."}, {"tab": "Global Rules", "section": "7% Annual Price Increase - Rules & Defense", "type": "stat", "icon": "", "color": "red", "label": "Standard Annual Increase", "value": "7%", "text": "Default for all renewals. Reflects platform improvements expanded features and market inflation."}, {"tab": "Global Rules", "section": "7% Annual Price Increase - Rules & Defense", "type": "stat", "icon": "", "color": "amber", "label": "Negotiable Range", "value": "3-7%", "text": "Customer can negotiate within the 3-7% range. Below 3% requires Sai approval. 0% is never an option - the price increase clause cannot be removed from the contract."}, {"tab": "Global Rules", "section": "7% Annual Price Increase - Rules & Defense", "type": "stat", "icon": "", "color": "green", "label": "Multi-Year", "value": "Price Lock During Term", "text": "On a multi-year renewal the customer takes a one-time increase (3-7%) then locks that new rate for the full term. No further increases during the contract. The escalator clause stays in the contract - it reactivates after the multi-year period ends."}, {"tab": "Global Rules", "section": "7% Annual Price Increase - Rules & Defense", "type": "tactic", "icon": "", "color": "", "label": "The Increase Clause Stays in Every Contract", "value": "", "text": "There is no scenario where the price increase is removed from the contract. Even on multi-year deals the clause exists. The multi-year benefit is: the customer takes a one-time increase at renewal then locks that new rate for the term with no further adjustments. If a customer asks for 0% the answer is: We can negotiate the percentage within the 3-7% range and on a multi-year deal you take that increase once and then your rate is locked. But the escalator itself is a standard part of every contract."}, {"tab": "Global Rules", "section": "7% Annual Price Increase - Rules & Defense", "type": "script", "icon": "", "color": "", "label": "Script - Defending the 7% Increase", "value": "", "text": "Our standard annual adjustment is 7% which reflects the ongoing investment we're making in the platform - new AI capabilities expanded integrations and enhanced support. Most operators see this as well below the value of what's being added each year. That said if you want to minimize the impact a multi-year contract means you take one adjustment and lock that rate for the full term - no further increases. Want me to run both scenarios?"}, {"tab": "Global Rules", "section": "7% Annual Price Increase - Rules & Defense", "type": "script", "icon": "", "color": "", "label": "Script - Negotiating the %", "value": "", "text": "I can work with you on the specific number - we have flexibility in the 3-7% range. What I can't do is remove the increase entirely. If you want to minimize the impact a multi-year renewal is the best path - you take one adjustment and lock that rate for the full term. Which direction makes more sense for your team?"}, {"tab": "Global Rules", "section": "Creating Urgency - Getting Them to Sign Quickly", "type": "body", "icon": "⚡", "color": "", "label": "", "value": "", "text": "Never manufacture fake urgency. Build real qualitative pressure through scarcity timing and framing."}, {"tab": "Global Rules", "section": "Creating Urgency - Getting Them to Sign Quickly", "type": "tactic", "icon": "", "color": "", "label": "Onboarding Cohort Scarcity", "value": "", "text": "We run onboarding in cohorts and the next one starts [date]. If we miss that window the next one is [later date] which pushes your go-live by [X weeks]. I want to make sure you're in the earlier group."}, {"tab": "Global Rules", "section": "Creating Urgency - Getting Them to Sign Quickly", "type": "tactic", "icon": "", "color": "", "label": "Pricing Window", "value": "", "text": "This pricing is based on our current rate card. We review pricing quarterly and I can't guarantee these numbers will hold past [date]. I'd rather lock you in now while I can."}, {"tab": "Global Rules", "section": "Creating Urgency - Getting Them to Sign Quickly", "type": "tactic", "icon": "", "color": "", "label": "CSM Availability", "value": "", "text": "Right now I can get you paired with [CSM name] who has deep experience with [their segment]. Their capacity fills up fast - if we wait another few weeks I may need to assign someone else."}, {"tab": "Global Rules", "section": "Creating Urgency - Getting Them to Sign Quickly", "type": "tactic", "icon": "", "color": "", "label": "Competitive Timing", "value": "", "text": "I know you're also looking at [competitor]. The teams that get the most value from Momos are the ones who start before their busy season so the platform is dialed in when it matters most. If you're targeting [season] we should start now."}, {"tab": "Global Rules", "section": "Creating Urgency - Getting Them to Sign Quickly", "type": "tactic", "icon": "", "color": "", "label": "The 24-Hour Sai Rule (AE Alignment)", "value": "", "text": "For any deal requiring special approval: I need to take this to Sai within 24 hours - he's our CEO and he reviews these personally. Honestly you and I are on the same page here. Let me go to bat for you but I need your commitment that if he approves this we're signing. Can you give me that? This positions Sai as the gatekeeper and aligns the AE with the customer."}, {"tab": "Payment Terms", "section": "_principle", "type": "", "icon": "", "color": "", "label": "Core Principle - Annual Contracts Only", "value": "", "text": "We do annual contracts. Period. Annual upfront isn't a preference - it's the product. The discounts embedded in our model assume annual cash collection and commitment. Anything else requires special approval from Sai. Your job is to make annual feel like the obvious smart choice - never a concession."}, {"tab": "Payment Terms", "section": "Set the Frame Before Objections Arise", "type": "body", "icon": "①", "color": "", "label": "", "value": "", "text": "The best objection is the one that never happens. Frame annual as the default early - never introduce it as an ask at the end of the deal."}, {"tab": "Payment Terms", "section": "Set the Frame Before Objections Arise", "type": "script", "icon": "", "color": "", "label": "Script - Frame on First Call", "value": "", "text": "Just so you know how we work - all our contracts are annual. That's actually how we're able to offer the pricing we do. We'll get you the numbers based on that structure."}, {"tab": "Payment Terms", "section": "Set the Frame Before Objections Arise", "type": "script", "icon": "", "color": "", "label": "Script - Reinforce During Proposal", "value": "", "text": "This quote reflects annual billing which is our standard. It lets us fully commit the resources your account needs from Day 1."}, {"tab": "Payment Terms", "section": "Set the Frame Before Objections Arise", "type": "tactic", "icon": "", "color": "", "label": "Anchoring Psychology", "value": "", "text": "Present annual as the baseline not the premium. Customers negotiate from the anchor you set. Never introduce monthly or quarterly as options - if you do you've already created a cheaper alternative in their mind."}, {"tab": "Payment Terms", "section": "Decision Tree - When They Push Back", "type": "body", "icon": "②", "color": "", "label": "", "value": "", "text": "Decision tree for when they push back on annual billing."}, {"tab": "Payment Terms", "section": "Decision Tree - When They Push Back", "type": "decision", "icon": "", "color": "", "label": "", "value": "Customer says: \"We prefer to pay monthly / quarterly\" - Why?", "text": ""}, {"tab": "Payment Terms", "section": "Decision Tree - When They Push Back", "type": "branch", "icon": "", "color": "amber", "label": "Scope / Resource Alignment", "value": "", "text": "They want to match payment to how they see the relationship scaling. Reframe: annual billing is how we align scope and resources on both sides - it lets us commit CSM time engineering support and onboarding resources proportionally to the full annual engagement."}, {"tab": "Payment Terms", "section": "Decision Tree - When They Push Back", "type": "branch", "icon": "", "color": "purple", "label": "Trust / Risk", "value": "", "text": "They're worried about committing to something they haven't tried. Use the 3-month contract opt-out. Do NOT shorten location count - keep scope intact shorten to 1-year term if needed."}, {"tab": "Payment Terms", "section": "Decision Tree - When They Push Back", "type": "script", "icon": "", "color": "", "label": "Script - Qualitative Pushback on Monthly/Quarterly", "value": "", "text": "I totally understand the instinct but here's the thing - we've structured everything around annual because it lets us go all-in on your success from day one. Our onboarding CSM assignment integration work - it's all built around having a committed annual partnership. When customers are on monthly they tend to get a lighter-touch experience because we can't justify the same resource investment. Annual is how you get the full Momos experience."}, {"tab": "Payment Terms", "section": "Decision Tree - When They Push Back", "type": "script", "icon": "", "color": "", "label": "Script - Scope / Resource Alignment", "value": "", "text": "I hear you - and I think the underlying question is about making sure both sides are equally committed. That's actually exactly why we do annual: it lets us allocate a dedicated CSM commit engineering resources for your integrations and prioritize your onboarding. On a monthly setup we can't justify that same level of investment because the commitment isn't there from either side. Annual is how we align scope and resources so you get the full platform experience."}, {"tab": "Payment Terms", "section": "Decision Tree - When They Push Back", "type": "script", "icon": "", "color": "", "label": "Script - Trust/Risk Objection", "value": "", "text": "That makes total sense - you want to know it works before you're locked in for a full year. Here's what we can do: you sign the annual contract and billing starts but you have a 3-month opt-out window. If within 90 days you decide this isn't the right fit you only pay for the time you've used and we refund the rest. That way you get the full experience - full onboarding full CSM support full platform - and you're still protected."}, {"tab": "Payment Terms", "section": "Decision Tree - When They Push Back", "type": "subheading", "icon": "", "color": "purple", "label": "Renewal Customer: Billing Migration + Price Increase", "value": "", "text": ""}, {"tab": "Payment Terms", "section": "Decision Tree - When They Push Back", "type": "stat", "icon": "", "color": "green", "label": "Monthly to Annual (First Switch)", "value": "No increase", "text": "First time switching to annual = no price increase. Subsequent renewals after the switch follow the standard 7% annual adjustment."}, {"tab": "Payment Terms", "section": "Decision Tree - When They Push Back", "type": "stat", "icon": "", "color": "green", "label": "Quarterly to Annual (First Switch)", "value": "No increase", "text": "Same as monthly - first switch to annual means no increase. After that standard annual pricing increases apply at each renewal."}, {"tab": "Payment Terms", "section": "Decision Tree - When They Push Back", "type": "stat", "icon": "", "color": "amber", "label": "Annual to Annual", "value": "+7%", "text": "Standard 7% increase. Negotiable to 3-7% never 0%. For multi-year: take a one-time increase then lock that new rate for the term."}, {"tab": "Payment Terms", "section": "Decision Tree - When They Push Back", "type": "script", "icon": "", "color": "", "label": "Script - Renewal with Price Increase", "value": "", "text": "Your renewal includes our standard annual adjustment of 7% which reflects all the platform improvements over the past year. I know that's a factor - so here's what I'd suggest: we apply a one-time increase in the 3-7% range and then you can lock that new rate in for 2-3 years with no further increases during the term. That way you take one adjustment now and get price certainty going forward. Want me to model what a 2-year and 3-year renewal look like at different increase levels?"}, {"tab": "Payment Terms", "section": "Decision Tree - When They Push Back", "type": "script", "icon": "", "color": "", "label": "Script - Billing Migration", "value": "", "text": "Great news - because you're moving from monthly to annual there's no price increase applied. Your rate stays the same you just pay once a year instead of tracking monthly charges. Most of our customers find this a lot easier to manage. Want me to update the quote?"}, {"tab": "Payment Terms", "section": "Nuclear Option - They Still Refuse Annual", "type": "body", "icon": "③", "color": "", "label": "", "value": "", "text": "Nuclear option when they refuse annual billing."}, {"tab": "Payment Terms", "section": "Nuclear Option - They Still Refuse Annual", "type": "stat", "icon": "", "color": "red", "label": "Your Move", "value": "", "text": "Escalate to Sai for special approval. You have a 24-hour deadline to bring it to him. Do NOT calculate alternative pricing yourself. Do NOT share any premium % with the customer - Sai determines terms directly."}, {"tab": "Payment Terms", "section": "Nuclear Option - They Still Refuse Annual", "type": "stat", "icon": "", "color": "amber", "label": "How to Position It", "value": "", "text": "Align yourself with the customer. You're on their side taking it to the CEO to fight for them. This positions Sai as the approver/gatekeeper and keeps you as the trusted advisor."}, {"tab": "Payment Terms", "section": "Nuclear Option - They Still Refuse Annual", "type": "subheading", "icon": "", "color": "amber", "label": "Quarterly Fallback - Last Resort (Sai Approval Required)", "value": "", "text": ""}, {"tab": "Payment Terms", "section": "Nuclear Option - They Still Refuse Annual", "type": "stat", "icon": "", "color": "red", "label": "Payment Cadence", "value": "Quarterly", "text": ""}, {"tab": "Payment Terms", "section": "Nuclear Option - They Still Refuse Annual", "type": "stat", "icon": "", "color": "red", "label": "Pricing Premium", "value": "+15-20%", "text": "INTERNAL ONLY - do NOT share the premium percentage with the customer."}, {"tab": "Payment Terms", "section": "Nuclear Option - They Still Refuse Annual", "type": "stat", "icon": "", "color": "red", "label": "Signing Deadline", "value": "48 hours", "text": ""}, {"tab": "Payment Terms", "section": "Nuclear Option - They Still Refuse Annual", "type": "body", "icon": "", "color": "", "label": "", "value": "", "text": "If the customer absolutely will not do annual the only alternative is quarterly billing with a 15-20% pricing premium. Internal only - do NOT share the premium percentage with the customer. Let Sai deliver the number directly after you escalate. The 48-hour signing window is non-negotiable: this exception pricing expires. Make it feel earned and exceptional not automatic. If they won't commit within 48 hours the offer reverts to annual-only."}, {"tab": "Payment Terms", "section": "Nuclear Option - They Still Refuse Annual", "type": "script", "icon": "", "color": "", "label": "Script - Introducing the Quarterly Possibility", "value": "", "text": "I hear you - annual isn't going to work for your team right now. Here's what I can do: I'll take this to our CEO and see if he'll approve a quarterly billing structure. I should be transparent - it will come with a pricing premium because it fundamentally changes our economics. But if he approves it we'd need to move fast - these exceptions have a 48-hour window. Let me go to him today. If he comes back with something that works are you ready to sign?"}, {"tab": "Payment Terms", "section": "Nuclear Option - They Still Refuse Annual", "type": "script", "icon": "", "color": "", "label": "Script - Escalating to Sai", "value": "", "text": "I want to get you the best possible path here so I'm going to loop in our CEO directly. He's involved in any non-standard billing structures and honestly that's more likely to get you a yes than anything I could offer on my own. I need to bring this to him within 24 hours - but I need to know: if he approves something that works for you are we signing? Give me that commitment and I'll go to bat for you."}, {"tab": "Platform & Impl Fees", "section": "_rules", "type": "", "icon": "", "color": "", "label": "These Are Standard - Not Optional", "value": "", "text": ""}, {"tab": "Platform & Impl Fees", "section": "_rules", "type": "warning", "icon": "", "color": "red", "label": "Part of the deal structure", "value": "", "text": "Platform fees and implementation fees are part of the deal structure not add-ons the AE can waive. Every customer pays them. Removing or reducing them requires CEO approval."}, {"tab": "Platform & Impl Fees", "section": "_rules", "type": "warning", "icon": "", "color": "red", "label": "Anchor on one not both.", "value": "", "text": "Customers rarely negotiate both the per-location-per-month price and the implementation fee hard. Figure out which one the customer cares about more and anchor your defense there. Give ground on the other only if truly needed."}, {"tab": "Platform & Impl Fees", "section": "Implementation Fee - Rules & Defense", "type": "body", "icon": "⚙", "color": "", "label": "", "value": "", "text": "Implementation fee rules and defense."}, {"tab": "Platform & Impl Fees", "section": "Implementation Fee - Rules & Defense", "type": "stat", "icon": "", "color": "purple", "label": "Target Rate", "value": "20%", "text": "Of Year 1 ACV. This is where you start. It reflects the real cost of engineering onboarding and integration work."}, {"tab": "Platform & Impl Fees", "section": "Implementation Fee - Rules & Defense", "type": "stat", "icon": "", "color": "red", "label": "Floor", "value": "10%", "text": "Absolute minimum. Below 10% requires CEO approval. You should never lead with this - it's a fallback not a starting point."}, {"tab": "Platform & Impl Fees", "section": "Implementation Fee - Rules & Defense", "type": "stat", "icon": "", "color": "amber", "label": "50+ Locations", "value": "Required", "text": "Mandatory for 50+ loc deals. Under 50: 3-month contract opt-out available instead (no implementation fee required)."}, {"tab": "Platform & Impl Fees", "section": "Implementation Fee - Rules & Defense", "type": "tactic", "icon": "", "color": "", "label": "How the 20% Is Calculated - Your Justification", "value": "", "text": "The implementation fee covers real engineering hours: integration configuration data migration location setup QA testing and team training. For a typical enterprise deal this represents 40-80+ hours of dedicated engineering and onboarding time. At blended rates of $150-200/hr for technical implementation resources the 20% target is often at or below our actual cost. This isn't a profit center - it's cost recovery for making sure the platform works on day one."}, {"tab": "Platform & Impl Fees", "section": "Implementation Fee - Rules & Defense", "type": "decision", "icon": "", "color": "", "label": "", "value": "Customer pushes back: \"Why do I have to pay an implementation fee?\"", "text": ""}, {"tab": "Platform & Impl Fees", "section": "Implementation Fee - Rules & Defense", "type": "branch", "icon": "", "color": "green", "label": "They Want to Understand It", "value": "", "text": "Walk through the hours. Use the engineering cost justification above. Make it tangible: This is X hours of integration engineering at blended rates."}, {"tab": "Platform & Impl Fees", "section": "Implementation Fee - Rules & Defense", "type": "branch", "icon": "", "color": "red", "label": "They Want to Remove It", "value": "", "text": "Do NOT offer to remove it. Explain what happens without proper implementation. If under 50 locations you can offer the 3-month contract opt-out path. If they push below 10% escalate to Sai."}, {"tab": "Platform & Impl Fees", "section": "Implementation Fee - Rules & Defense", "type": "script", "icon": "", "color": "", "label": "Script - Implementation Fee Value", "value": "", "text": "The implementation fee covers 40-80 hours of dedicated engineering and onboarding work - integration configuration data migration location setup testing and training. We price it at 20% of Year 1 ACV which is actually at or below our blended engineering cost for this work. The customers who skip or minimize this step are the ones who see slower time-to-value and lower adoption in their first 90 days. It's a one-time cost that protects the investment you're making in the platform."}, {"tab": "Platform & Impl Fees", "section": "Implementation Fee - Rules & Defense", "type": "script", "icon": "", "color": "", "label": "Script - When They Keep Pushing", "value": "", "text": "I hear you - it feels like an extra cost on top. But think of it this way: you're paying [ACV] per year for this platform to work. The implementation fee is what makes sure it actually does. We've seen operators try to skip this step and then spend months underutilizing the platform - that's the real cost. If the total contract value is the issue let's look at contract length or modules - but the implementation fee stays in."}, {"tab": "Platform & Impl Fees", "section": "Implementation Fee - Rules & Defense", "type": "tactic", "icon": "", "color": "", "label": "Anchoring Strategy: PLPM vs. Implementation", "value": "", "text": "Customers almost never negotiate both the per-location price and the implementation fee equally hard. Early in the negotiation figure out which one they care about more. If they're fixated on PLPM hold firm there and know you have a little room on implementation (above the 10% floor). If they're fixated on implementation hold that firm and know you can adjust scope or term to move PLPM. The key is: never give ground on both."}, {"tab": "Platform & Impl Fees", "section": "Platform (CSM) Fee - Rules & Defense", "type": "body", "icon": "🤝", "color": "", "label": "", "value": "", "text": "Platform fees cover customer operations support and CSM partnership. Standard tier is included in every deal. Every customer is on a platform tier - it is not optional. The goal is to steer customers toward Pro."}, {"tab": "Platform & Impl Fees", "section": "Platform (CSM) Fee - Rules & Defense", "type": "csm_table", "icon": "", "color": "", "label": "", "value": "", "text": "Standard|$0|Support only|-|Reactive|Best effort|INCLUDED;Plus|$700|Shared CSM|2 hrs/mo|Bi-weekly|< 24 hrs|UPSELL;Pro|$2000|Enterprise CSM|8 hrs/mo|Weekly|< 12 hrs|TARGET TIER;Enterprise|TBD|Enterprise CSM|Custom|Custom|Custom|STRATEGIC"}, {"tab": "Platform & Impl Fees", "section": "Platform (CSM) Fee - Rules & Defense", "type": "body", "icon": "", "color": "", "label": "", "value": "", "text": "Internal note: Enterprise tier is priced by location. Do not share a fixed rate with customers - pricing is determined case-by-case with Sai."}, {"tab": "Platform & Impl Fees", "section": "Platform (CSM) Fee - Rules & Defense", "type": "subheading", "icon": "", "color": "red", "label": "Pricing Psychology - Steering to Pro", "value": "", "text": ""}, {"tab": "Platform & Impl Fees", "section": "Platform (CSM) Fee - Rules & Defense", "type": "tactic", "icon": "", "color": "", "label": "Make Lower Tiers Feel Insufficient", "value": "", "text": "Standard is not a CSM - it's customer operations support (ticket-based reactive). Plus is a shared CSM - they're splitting attention across multiple accounts. Pro is where you get an Enterprise CSM - a senior CSM who manages fewer accounts knows your business deeply is proactive and is in your data weekly. The value gap between Plus and Pro should feel massive relative to the price gap."}, {"tab": "Platform & Impl Fees", "section": "Platform (CSM) Fee - Rules & Defense", "type": "tactic", "icon": "", "color": "", "label": "Social Proof Anchor", "value": "", "text": "Use this framing early and often: Most of our customers choose Plus or Pro - Standard is really only for teams that have an in-house data and operations team already. This makes Standard feel like the outlier not the default and pushes the conversation to Plus vs. Pro rather than Standard vs. everything else."}, {"tab": "Platform & Impl Fees", "section": "Platform (CSM) Fee - Rules & Defense", "type": "tactic", "icon": "", "color": "", "label": "Risk-Free Pro Trial", "value": "", "text": "If the customer is between Plus and Pro: Let me do this - we'll start you on Pro for the first month. You pay for it but if after 30 days you feel Plus is enough we'll refund the difference and downgrade you. That way you see what an Enterprise CSM - senior-level fewer accounts weekly in your data - actually looks like before you decide. Most people who try Pro don't go back."}, {"tab": "Platform & Impl Fees", "section": "Platform (CSM) Fee - Rules & Defense", "type": "decision", "icon": "", "color": "", "label": "", "value": "Customer pushes back: \"We don't need this much CSM support / why are we paying for support?\"", "text": ""}, {"tab": "Platform & Impl Fees", "section": "Platform (CSM) Fee - Rules & Defense", "type": "branch", "icon": "", "color": "green", "label": "On Standard (Free)", "value": "", "text": "Explain that Standard is customer operations support - not a CSM. They get ticket-based reactive support. If they want proactive partnership that starts at Plus. The question isn't whether they need support it's whether they want reactive or proactive."}, {"tab": "Platform & Impl Fees", "section": "Platform (CSM) Fee - Rules & Defense", "type": "branch", "icon": "", "color": "red", "label": "Pushing Back on Plus/Pro", "value": "", "text": "Use the social proof anchor: Most operators your size are on Plus or Pro. Reframe the cost as prevention: one issue caught early by a proactive CSM pays for the tier. If they genuinely want to downgrade Standard is the floor."}, {"tab": "Platform & Impl Fees", "section": "Platform (CSM) Fee - Rules & Defense", "type": "script", "icon": "", "color": "", "label": "Script - Standard Tier Explanation", "value": "", "text": "Standard comes included with every deal - there's no additional charge. What it gives you is customer operations support: you can submit tickets and our team will respond on a best-effort basis. What it doesn't include is a CSM. On Plus you get a shared CSM who checks in bi-weekly. On Pro you get an Enterprise CSM - a senior CSM who manages fewer accounts and is in your data weekly flagging issues proactively. Most of our customers at your size choose Plus or Pro - Standard is really designed for teams that already have in-house ops and data capabilities."}, {"tab": "Platform & Impl Fees", "section": "Platform (CSM) Fee - Rules & Defense", "type": "script", "icon": "", "color": "", "label": "Script - Upgrading from Plus to Pro", "value": "", "text": "The difference between Plus and Pro is night and day. On Plus your CSM is shared - they're supporting multiple accounts and checking in bi-weekly. On Pro you get an Enterprise CSM - a senior CSM who manages fewer accounts. They know your locations your pain points and they're in your data weekly catching things before you see them. For operators running [X] locations that pays for itself the first time it catches a negative review trend or identifies a location falling behind. Want to try Pro risk-free for the first month?"}, {"tab": "Discount Defense", "section": "_principle", "type": "", "icon": "", "color": "", "label": "Core Principle - Price Is a Signal of Value", "value": "", "text": "Every time you discount without a trade you signal that your original price was inflated. Best-in-class AEs don't negotiate price - they negotiate scope timeline and terms. Protect your price; adjust the deal structure."}, {"tab": "Discount Defense", "section": "Discount Authority Levels", "type": "body", "icon": "📊", "color": "", "label": "", "value": "", "text": "Discount authority levels and approval tiers."}, {"tab": "Discount Defense", "section": "Discount Authority Levels", "type": "stat", "icon": "", "color": "green", "label": "AE Discretion", "value": "0-10%", "text": "No approval needed. Use sparingly - to close not to open. Once used it's gone. Any discount triggers a 24-hour signature deadline."}, {"tab": "Discount Defense", "section": "Discount Authority Levels", "type": "stat", "icon": "", "color": "amber", "label": "Manager Approval", "value": "10-20%", "text": "Davi or Sai. Suggest a 2-year contract to make approval more likely. Use for competitive deals or champions fighting internally for budget."}, {"tab": "Discount Defense", "section": "Discount Authority Levels", "type": "stat", "icon": "", "color": "red", "label": "CEO Only", "value": "20%+", "text": "Sai only. Indicate that 3-year (or 4-year) contracts are the only way this might get approved. Reserved for strategic enterprise accounts."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "body", "icon": "↔", "color": "", "label": "", "value": "", "text": "The discount decision tree."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "decision", "icon": "", "color": "", "label": "", "value": "Customer asks: \"Can you do better on price?\" - First: Have you established full value?", "text": ""}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "branch", "icon": "", "color": "amber", "label": "Yes - Value Established", "value": "", "text": "Use the Value Anchor response before giving anything. Never lead with the discount."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "branch", "icon": "", "color": "red", "label": "No - Not Yet", "value": "", "text": "Stop. Do not quote a discount. Return to the value conversation first. You cannot defend price you haven't built."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "tactic", "icon": "", "color": "", "label": "Value Anchor Before Any Discount", "value": "", "text": "Never respond to a discount request immediately. Pause then re-anchor to outcomes: competitive differentiation the cost of the problem they're solving and what comparable operators are already achieving on the platform."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "script", "icon": "", "color": "", "label": "Script - Initial Discount Deflection", "value": "", "text": "Before I look at numbers help me understand - is price the only thing standing between us and moving forward? Because if there are other concerns I don't want to give up margin without solving the real issue."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "decision", "icon": "", "color": "", "label": "", "value": "After value conversation - still asking for a discount or using a competitor as leverage?", "text": ""}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "branch", "icon": "", "color": "amber", "label": "Competitor Leverage", "value": "", "text": "Validate then reframe with differentiation. Use the competitor response script below."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "branch", "icon": "", "color": "green", "label": "Just Testing", "value": "", "text": "Hold price. Offer a non-cash value add: extra onboarding CSM tier upgrade for month 1 or priority onboarding cohort."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "script", "icon": "", "color": "", "label": "Script - Competitor Leverage", "value": "", "text": "I appreciate you being transparent about that. The honest answer is we're probably not the cheapest option - and that's intentional. [Competitor] is solid for [X] but what we're seeing with operators your size is the gap shows up in [specific differentiator]. Can I show you a quick comparison?"}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "decision", "icon": "", "color": "", "label": "", "value": "Deal is genuinely at risk on price - is there a structural lever before a flat % discount?", "text": ""}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "branch", "icon": "", "color": "green", "label": "Yes - Use Structural Trade", "value": "", "text": "Trade discount for value: multi-year contract customer reference case study faster close. I can get you 10% off if we go 2-year you sign in 24 hours and you agree to be a reference."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "branch", "icon": "", "color": "red", "label": "No Structure Available", "value": "", "text": "Escalate to manager for 10-20% approval. Suggest 2-year to strengthen the case. 24-hour deadline to Sai for anything 20%+ with 3-year minimum."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "subheading", "icon": "", "color": "red", "label": "The Price / Speed / Certainty Triangle", "value": "", "text": ""}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "tactic", "icon": "", "color": "", "label": "If They Want Price We Need Speed and Certainty", "value": "", "text": "Every discount triggers a trade. The customer picks one lever (price) and we get the other two (speed + certainty). Any discount - at any tier - results in a 24-hour deadline to signature. This is non-negotiable. Frame it clearly: I can work on the price but I need a commitment that if I get this approved we're signing within 24 hours. Price speed certainty - I can give you price but I need the other two."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "subheading", "icon": "", "color": "red", "label": "What We Get in Return (Give to Get)", "value": "", "text": ""}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "body", "icon": "", "color": "", "label": "", "value": "", "text": "Every concession you make should feel earned. These are the trades that make a discount feel like a partnership not an extraction. Present these as part of the deal not as afterthoughts."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "trade", "icon": "", "color": "", "label": "24-hour signature deadline", "value": "REQUIRED", "text": "Required on every discount. I can get you this price but it's a 24-hour window. If we miss it we revert to standard."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "trade", "icon": "", "color": "", "label": "Customer reference", "value": "NON-CASH", "text": "Agree to be a reference for future prospects in their segment. Zero cost to them high value to us."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "trade", "icon": "", "color": "", "label": "Customer case study", "value": "NON-CASH", "text": "Participate in a written or video case study within 6 months. Great for marketing - makes the discount feel like a partnership."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "trade", "icon": "", "color": "", "label": "Multi-year commitment", "value": "CONTRACT", "text": "10-20% discount - suggest 2-year to make manager approval more likely. 20%+ - 3-year or 4-year is the only path to CEO approval."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "trade", "icon": "", "color": "", "label": "Plan upgrade (Core to Growth)", "value": "BUNDLE", "text": "5% bundle savings on Growth 15% on Platform. More product stickiness for CSM + higher retention."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "trade", "icon": "", "color": "", "label": "Additional locations", "value": "SCOPE", "text": "Expand location count in exchange for better per-location rate. Increases total ACV even at a discount."}, {"tab": "Discount Defense", "section": "The Discount Decision Tree", "type": "script", "icon": "", "color": "", "label": "Script - The Give to Get", "value": "", "text": "I can work on the pricing for you - but here's what I'd need in return. First if I get this approved we're signing within 24 hours. Second I'd love for you to be a reference customer for us - we'll ask you to hop on a call with a prospect or two in your segment and ideally participate in a case study down the road. That way this feels like a partnership not just a discount. Fair?"}, {"tab": "Discount Defense", "section": "What To NEVER Do", "type": "body", "icon": "🚫", "color": "", "label": "", "value": "", "text": "What to never do when discounting."}, {"tab": "Discount Defense", "section": "What To NEVER Do", "type": "never", "icon": "", "color": "", "label": "", "value": "Never offer a discount before they ask for one. You're training them to always expect more.", "text": ""}, {"tab": "Discount Defense", "section": "What To NEVER Do", "type": "never", "icon": "", "color": "", "label": "", "value": "Never say I can give you X% off as an opener. You've negotiated against yourself.", "text": ""}, {"tab": "Discount Defense", "section": "What To NEVER Do", "type": "never", "icon": "", "color": "", "label": "", "value": "Never give a discount without getting something in return. A trade makes the discount feel earned not extracted.", "text": ""}, {"tab": "Discount Defense", "section": "What To NEVER Do", "type": "never", "icon": "", "color": "", "label": "", "value": "Never promise a discount that requires approval before you have it. It destroys your credibility if it falls through.", "text": ""}, {"tab": "Discount Defense", "section": "What To NEVER Do", "type": "never", "icon": "", "color": "", "label": "", "value": "Never let a discount conversation die in email. Call them - urgency dies in async.", "text": ""}, {"tab": "Discount Defense", "section": "What To NEVER Do", "type": "never", "icon": "", "color": "", "label": "", "value": "Never negotiate both PLPM and implementation fee. Figure out which one the customer cares about and anchor there.", "text": ""}, {"tab": "Contract Length", "section": "_principle", "type": "", "icon": "", "color": "", "label": "Core Principle - Annual Is Standard Multi-Year Is the Reward", "value": "", "text": "Annual contracts are our standard and we're happy with them. Don't use pricing to coerce customers into multi-year. Instead multi-year is a tool you deploy when the customer pushes hard on price - it's how they unlock bigger discounts and price protection. Separately use the price-lock benefit to proactively persuade customers who are a good fit."}, {"tab": "Contract Length", "section": "Contract Length Value Matrix", "type": "body", "icon": "📐", "color": "", "label": "", "value": "", "text": "Contract length value matrix."}, {"tab": "Contract Length", "section": "Contract Length Value Matrix", "type": "stat", "icon": "", "color": "green", "label": "1 Year", "value": "Standard", "text": "Our default. Subject to 7% annual increase at renewal. This is a perfectly good outcome - don't treat it as a fallback."}, {"tab": "Contract Length", "section": "Contract Length Value Matrix", "type": "stat", "icon": "", "color": "amber", "label": "2 Year", "value": "Discount Unlock", "text": "Suggest when customer wants 10-20% discount. Makes manager approval more likely. Locks pricing for 24 months."}, {"tab": "Contract Length", "section": "Contract Length Value Matrix", "type": "stat", "icon": "", "color": "purple", "label": "3-4 Year", "value": "CEO Approval Path", "text": "Required for 20%+ discounts. The only way to get CEO-level pricing approved. Full price lock for the term."}, {"tab": "Contract Length", "section": "Defense: Multi-Year as a Discount Response", "type": "body", "icon": "🛡️", "color": "", "label": "", "value": "", "text": "Don't lead with multi-year - use it as your response when the customer pushes hard on price. The discount tiers and contract length work together:"}, {"tab": "Contract Length", "section": "Defense: Multi-Year as a Discount Response", "type": "stat", "icon": "", "color": "green", "label": "0-10% Discount", "value": "AE Discretion", "text": "No contract length requirement. Annual is fine."}, {"tab": "Contract Length", "section": "Defense: Multi-Year as a Discount Response", "type": "stat", "icon": "", "color": "amber", "label": "10-20% Discount", "value": "Suggest 2-Year", "text": "I can take this to my manager and a 2-year commitment makes it much more likely to get approved."}, {"tab": "Contract Length", "section": "Defense: Multi-Year as a Discount Response", "type": "stat", "icon": "", "color": "red", "label": "20%+ Discount", "value": "3-Year+ Required", "text": "The only way I can take this to the CEO is with a 3-year commitment. That's the trade."}, {"tab": "Contract Length", "section": "Defense: Multi-Year as a Discount Response", "type": "script", "icon": "", "color": "", "label": "Script - Linking Discount to Contract Length", "value": "", "text": "I hear you on the pricing - and I want to find a way to make this work. Here's the reality: a discount at this level needs manager approval and the strongest case I can make is with a 2-year commitment. You'd take a one-time price adjustment and then that rate is locked for the full term - no further increases for 24 months. If I go to my manager with a 1-year deal at this price it's going to be a much harder conversation. Which direction makes more sense?"}, {"tab": "Contract Length", "section": "Defense: Multi-Year as a Discount Response", "type": "script", "icon": "", "color": "", "label": "Script - CEO-Level Discount", "value": "", "text": "I want to be transparent - a discount at this level requires our CEO's direct approval. The only scenario where he's likely to say yes is a 3-year (or longer) commitment. At that level you take one price adjustment and lock that rate for the full term - no further increases. I need to bring this to him within 24 hours - if he approves are you ready to commit to a 3-year?"}, {"tab": "Contract Length", "section": "Offense: Price-Lock as a Proactive Sell", "type": "body", "icon": "⚡", "color": "", "label": "", "value": "", "text": "Separately from discount conversations use the 7% annual increase as a proactive reason to go multi-year. This is the offense play - you're not responding to a discount request you're creating value."}, {"tab": "Contract Length", "section": "Offense: Price-Lock as a Proactive Sell", "type": "tactic", "icon": "", "color": "", "label": "The Price-Lock Pitch", "value": "", "text": "Frame multi-year as a smart financial decision independent of discounts: Even without a discount a multi-year contract means you take one adjustment and lock that rate for 2-3 years. No further increases during the term. Over 3 years that compounding protection adds up to real money compared to annual renewals with 7% adjustments each time."}, {"tab": "Contract Length", "section": "Offense: Price-Lock as a Proactive Sell", "type": "script", "icon": "", "color": "", "label": "Script - Proactive Price-Lock", "value": "", "text": "One thing I want to flag before we finalize - our standard renewal includes a 7% annual adjustment. On a multi-year contract you'd take one adjustment at renewal and then that rate is locked for the full term - no further increases. A 2-year locks for 24 months a 3-year for 36. Most of our enterprise customers who signed multi-year early are glad they did. Want me to model what that looks like?"}, {"tab": "Contract Length", "section": "Handling Objections to Multi-Year", "type": "body", "icon": "↔", "color": "", "label": "", "value": "", "text": "Handling objections to multi-year contracts."}, {"tab": "Contract Length", "section": "Handling Objections to Multi-Year", "type": "decision", "icon": "", "color": "", "label": "", "value": "What is the customer's stated objection to multi-year?", "text": ""}, {"tab": "Contract Length", "section": "Handling Objections to Multi-Year", "type": "branch", "icon": "", "color": "amber", "label": "We don't know if this will work", "value": "", "text": "Risk objection. Use customer proof and offer the 1-year path confidently."}, {"tab": "Contract Length", "section": "Handling Objections to Multi-Year", "type": "branch", "icon": "", "color": "purple", "label": "We don't do multi-year deals", "value": "", "text": "Policy objection. Engage the price-lock argument and draft both scenarios for their internal team."}, {"tab": "Contract Length", "section": "Handling Objections to Multi-Year", "type": "tactic", "icon": "", "color": "", "label": "Lead with Customer Proof", "value": "", "text": "Our enterprise customers don't leave us. Say it confidently: I understand the concern but I should tell you - our enterprise retention is exceptional. Once customers are on the platform they stay. We're happy to do a 1-year contract if that's more comfortable. But if you want to avoid repeated annual increases multi-year is the way - you take one adjustment and lock that rate for the term. We can't agree to removing the price increase from the contract - it has to be a number greater than 0."}, {"tab": "Contract Length", "section": "Handling Objections to Multi-Year", "type": "script", "icon": "", "color": "", "label": "Script - Risk Objection", "value": "", "text": "Completely understand - and look we're totally fine with a 1-year contract. Our enterprise customers never leave us so I'm confident you'll renew. The only thing I'd flag is that a 1-year deal comes with a 7% adjustment at each renewal. If that matters to you a multi-year renewal means you take one adjustment and lock that rate for the full term. But if you'd rather start with 1 year and revisit at renewal we can absolutely do that."}, {"tab": "Contract Length", "section": "Handling Objections to Multi-Year", "type": "script", "icon": "", "color": "", "label": "Script - Policy Override", "value": "", "text": "I respect that - it's a question I get from a lot of [industry] operators. What most of them find is that restaurant-tech is a category where locking in current pricing matters more than almost anywhere else because it's improving fast and prices are moving. With our standard 7% annual increase a 3-year deal at today's rate vs. three 1-year renewals saves you a meaningful amount. I can draft both scenarios if it helps you make the internal case."}, {"tab": "Plan Upsell", "section": "Plan Bundle Overview", "type": "body", "icon": "📦", "color": "", "label": "", "value": "", "text": "Plan bundle overview."}, {"tab": "Plan Upsell", "section": "Plan Bundle Overview", "type": "stat", "icon": "", "color": "gray", "label": "Core - 1 Product", "value": "0%", "text": "Single module only. Entry point - not the destination. Flag for CSM expansion at 90 days."}, {"tab": "Plan Upsell", "section": "Plan Bundle Overview", "type": "stat", "icon": "", "color": "blue", "label": "Growth - 2 Products", "value": "5% off", "text": "Default recommendation. The majority of our customers are on 2 or 3 products. CS + CX is the natural pairing. Always lead with this."}, {"tab": "Plan Upsell", "section": "Plan Bundle Overview", "type": "stat", "icon": "", "color": "purple", "label": "Platform - CS + CX + LM", "value": "15% off", "text": "Full platform. Best economics. Push hard for multi-location operators. Strongest deal + highest retention."}, {"tab": "Plan Upsell", "section": "Plan Bundle Overview", "type": "decision", "icon": "", "color": "", "label": "", "value": "Customer wants to start with just 1 module - is there a natural pairing?", "text": ""}, {"tab": "Plan Upsell", "section": "Plan Bundle Overview", "type": "branch", "icon": "", "color": "green", "label": "Yes - Natural Pairing", "value": "", "text": "Show the Growth bundle math. The majority of our customers are on 2 or 3 products - make them feel like Core is the outlier."}, {"tab": "Plan Upsell", "section": "Plan Bundle Overview", "type": "branch", "icon": "", "color": "amber", "label": "Not Yet", "value": "", "text": "Start on Core. Flag for CSM to expand at 90-day mark. Set the expectation: Most operators add a second product within the first quarter."}, {"tab": "Plan Upsell", "section": "Plan Bundle Overview", "type": "script", "icon": "", "color": "", "label": "Script - Growth Bundle Upsell", "value": "", "text": "So if you go with just CS you're at [X]. If we add CX normally that's [Y] more - but on Growth we bundle them at 5% off the combined rate. You're only paying [Z delta] more than standalone CS for a product that does significantly more. I should mention - the majority of our customers are on two or three products. Starting on Core is fine but most people end up adding a second module within the first quarter anyway and it's cheaper to bundle now than add later."}, {"tab": "Plan Upsell", "section": "Renewal Same-Plan Rule", "type": "body", "icon": "⚠", "color": "", "label": "", "value": "", "text": "Renewal same-plan rule."}, {"tab": "Plan Upsell", "section": "Renewal Same-Plan Rule", "type": "warning", "icon": "", "color": "amber", "label": "Renewal Bundle Discount Resets + 7% Increase Applies", "value": "", "text": "If a customer renews on the same plan (Growth to Growth or Platform to Platform) the bundle discount resets to $0 AND the 7% annual increase applies. Present this proactively so customers aren't surprised. The path to avoiding the increase: multi-year renewal."}, {"tab": "Plan Upsell", "section": "Renewal Same-Plan Rule", "type": "script", "icon": "", "color": "", "label": "Script - Renewal Same-Plan Framing", "value": "", "text": "Your renewal pricing looks different for two reasons: the initial bundle discount was a first-year incentive and we apply a standard annual adjustment. If you want to add [LM / new module] we can unlock a new bundle discount at Platform level. And if you want to lock your rate going forward a multi-year renewal means you take one increase and then that rate is locked for the full term. Want me to model that?"}, {"tab": "Approval Flow", "section": "_principle", "type": "", "icon": "", "color": "", "label": "All approval requests route to #pricing_approval_flow in Slack", "value": "", "text": "Multiple triggers stack - the highest level wins. The tool blocks PDF generation until the deal is approved. Never promise an approval you don't have. All escalations to Sai have a 24-hour deadline."}, {"tab": "Approval Flow", "section": "Complete Approval Trigger Map", "type": "body", "icon": "📋", "color": "", "label": "", "value": "", "text": "Complete approval trigger map."}, {"tab": "Approval Flow", "section": "Complete Approval Trigger Map", "type": "approval", "icon": "", "color": "green", "label": "AE ONLY", "value": "0-10% Discount", "text": "No approval needed. 24-hour signature deadline required on any discount."}, {"tab": "Approval Flow", "section": "Complete Approval Trigger Map", "type": "approval", "icon": "", "color": "amber", "label": "MANAGER", "value": "10-20% Discount", "text": "Davi or Sai. Suggest 2-year contract. Slack #pricing_approval_flow with full deal context."}, {"tab": "Approval Flow", "section": "Complete Approval Trigger Map", "type": "approval", "icon": "", "color": "red", "label": "CEO", "value": "20%+ Discount", "text": "Sai only. 3-year+ contract required. 24-hour deadline. Direct conversation with full deal summary."}, {"tab": "Approval Flow", "section": "Complete Approval Trigger Map", "type": "approval", "icon": "", "color": "red", "label": "CEO", "value": "Impl Fee Below 10%", "text": "Sai only. 24-hour deadline. Flag in tool - do not calculate alternative yourself."}, {"tab": "Approval Flow", "section": "Complete Approval Trigger Map", "type": "approval", "icon": "", "color": "red", "label": "CEO", "value": "Non-Annual Billing", "text": "Sai only. 24-hour deadline. Do NOT share premium % with customer."}, {"tab": "Approval Flow", "section": "Complete Approval Trigger Map", "type": "approval", "icon": "", "color": "red", "label": "CEO", "value": "Enterprise Unpaid Pilot", "text": "Sai only. 24-hour deadline. Customer must still pay implementation."}, {"tab": "Approval Flow", "section": "Complete Approval Trigger Map", "type": "approval", "icon": "", "color": "red", "label": "CEO", "value": "Per-Year Discount Variation", "text": "Sai only. 24-hour deadline. Explain the business rationale."}, {"tab": "Approval Flow", "section": "Complete Approval Trigger Map", "type": "approval", "icon": "", "color": "red", "label": "CEO", "value": "Annual Increase Below 3%", "text": "Sai only. 24-hour deadline. 0% is never allowed."}, {"tab": "Approval Flow", "section": "Complete Approval Trigger Map", "type": "subheading", "icon": "", "color": "red", "label": "How to Brief Your Approver (Always Include This)", "value": "", "text": ""}, {"tab": "Approval Flow", "section": "Complete Approval Trigger Map", "type": "briefing", "icon": "", "color": "", "label": "", "value": "", "text": "Customer: [Name + size + segment] | Deal size: [ACV] [Locations] locs [Contract term] | Trigger: [what is requiring approval] | Why: [business reason] | What I've tried: [value reframe structural alternative etc.] | Risk of losing deal: [High / Medium / Low] | Timeline: [when decision needed - max 24 hours]"}, {"tab": "Approval Flow", "section": "Pricing Waterfall Reference", "type": "body", "icon": "🔄", "color": "", "label": "", "value": "", "text": "Every deal flows through this exact sequence. Each step builds on the previous one."}, {"tab": "Approval Flow", "section": "Pricing Waterfall Reference", "type": "body", "icon": "", "color": "", "label": "", "value": "", "text": "Subtotal (modules + add-ons) -> Bundle Discount -> Contract Discount -> Billing Adjustment (renewal) -> AE Discount -> Final $/loc/mo"}, {"tab": "Approval Flow", "section": "Pricing Waterfall Reference", "type": "body", "icon": "", "color": "", "label": "", "value": "", "text": "+ Implementation fee (one-time target 20% / floor 10% of Y1 ACV) + Platform fee (monthly flat all deals) + 7% annual increase at renewal (unless multi-year locks rate)"}, {"tab": "Closing Plays", "section": "The Best-in-Class AE Mindset", "type": "body", "icon": "🎯", "color": "", "label": "", "value": "", "text": "The mindset of a best-in-class AE."}, {"tab": "Closing Plays", "section": "The Best-in-Class AE Mindset", "type": "tactic", "icon": "", "color": "", "label": "Assume the Close", "value": "", "text": "Write proposals as if they're signing. Present timelines kickoff dates onboarding steps. Confidence is contagious."}, {"tab": "Closing Plays", "section": "The Best-in-Class AE Mindset", "type": "tactic", "icon": "", "color": "", "label": "Urgency Must Be Real", "value": "", "text": "Never manufacture fake urgency. Real urgency: onboarding cohorts CSM availability pricing windows quarter-end bandwidth."}, {"tab": "Closing Plays", "section": "The Best-in-Class AE Mindset", "type": "tactic", "icon": "", "color": "", "label": "Silence Is a Weapon", "value": "", "text": "After presenting the offer stop talking. The first person who speaks gives ground. Get comfortable with 3-5 seconds of silence."}, {"tab": "Closing Plays", "section": "The Best-in-Class AE Mindset", "type": "tactic", "icon": "", "color": "", "label": "Give to Get", "value": "", "text": "Every concession should cost them something. Even a small trade - reference case study faster signature - changes the dynamic."}, {"tab": "Closing Plays", "section": "The Best-in-Class AE Mindset", "type": "tactic", "icon": "", "color": "", "label": "Go High Early", "value": "", "text": "Always start at full price with standard fees and 20% implementation. Starting at a discount signals you don't believe in your own pricing. Remember: you have 0-10% discretion - save it for the close not the open."}, {"tab": "Closing Plays", "section": "The Best-in-Class AE Mindset", "type": "tactic", "icon": "", "color": "", "label": "Bounded Choices", "value": "", "text": "Do you want to go with the 1-year or 2-year? Not What do you think? Bounded choices accelerate decisions."}, {"tab": "Closing Plays", "section": "Closing Scripts", "type": "body", "icon": "💬", "color": "", "label": "", "value": "", "text": "Closing scripts for different situations."}, {"tab": "Closing Plays", "section": "Closing Scripts", "type": "script", "icon": "", "color": "", "label": "The What Would It Take Close", "value": "", "text": "I feel like we're close - I want to understand if there's something specific that would make this a clear yes for you. What would it take to get this done this week?"}, {"tab": "Closing Plays", "section": "Closing Scripts", "type": "script", "icon": "", "color": "", "label": "The Summary of Value Close", "value": "", "text": "Let me recap what you're getting: [module recap] [contract discount for multi-year] CSM support at [tier] implementation covered in the onboarding fee and kickoff on [date]. For [ACV] annually you're getting [core outcome]. That math works right?"}, {"tab": "Closing Plays", "section": "Closing Scripts", "type": "script", "icon": "", "color": "", "label": "The Competitive Close", "value": "", "text": "I know you're also talking to [competitor]. I think the decision comes down to [key differentiator]. What would help you make that comparison cleanly?"}, {"tab": "Closing Plays", "section": "Closing Scripts", "type": "script", k about what's working and what the next 12-24 months could look like. I should mention upfront that our standard renewal includes a 3-7% adjustment. The good news is if we do a multi-year renewal we apply the increase once and then lock that rate for the full term - no further increases during the contract. Can we block 30 minutes to walk through the options?"}, {"tab": "Closing Plays", "section": "CSM-Specific: Renewals & Expansion", "type": "tactic", "icon": "", "color": "", "label": "Expand Before You Renew", "value": "", "text": "A customer who just added modules has much higher commitment to renewal. A customer debating renewal is a much harder sell for expansion. Always expand first."}, {"tab": "Closing Plays", "section": "CSM-Specific: Renewals & Expansion", "type": "script", "icon": "", "color": "", "label": "Script - Expansion Pitch (CSM)", "value": "", "text": "Based on what I've seen in your account [LM / next module] would directly address [specific pain point we've discussed]. I can put together a quick add-on quote - it's actually cheaper per location to add it now than to price it separately at renewal. Want me to run the numbers?"}, {"tab": "Closing Plays", "section": "CSM-Specific: Renewals & Expansion", "type": "tactic", "icon": "", "color": "", "label": "Platform Fee Upgrade at Renewal", "value": "", "text": "Renewal is the natural moment to upgrade CSM tiers. If the customer has been on Standard and you've been doing more informal work formalize it. You've been getting shared CSM-level attention on a Standard plan - let's make it official with Plus or Pro so you're fully supported. Most operators your size are on Pro with an Enterprise CSM."}];
