<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momos — Pricing Defense Decision Tree</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #faf6f1; --bg-warm: #f5efe8; --bg-white: #ffffff; --card: #ffffff;
    --border: #e8e0d6; --border-light: #f0ead3;
    --red: #e04a3c; --red-light: #fdf0ee; --red-border: #f5ccc7;
    --green: #1a8a5c; --green-light: #edf8f2; --green-border: #c4e8d6;
    --amber: #c47b17; --amber-light: #fef8ec; --amber-border: #f5deb0;
    --blue: #2d6fba; --blue-light: #eef4fb; --blue-border: #bdd4f0;
    --purple: #7c3aed; --purple-light: #f5f0ff; --purple-border: #d4c1f7;
    --gray: #9a918a;
    --text: #1a1a1a; --text-secondary: #5c5650; --text-dim: #9a918a;
    --mono: 'JetBrains Mono', monospace; --sans: 'DM Sans', sans-serif;
    --radius: 12px; --radius-sm: 8px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.03);
    --shadow: 0 2px 8px rgba(0,0,0,.05), 0 1px 3px rgba(0,0,0,.04);
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  .header { background: var(--bg-white); border-bottom: 1px solid var(--border); padding: 20px 32px 0; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; gap: 14px; margin-bottom: 4px; }
  .logo { width: 34px; height: 34px; border-radius: 8px; background: var(--red); display: flex; align-items: center; justify-content: center; font-size: 17px; line-height: 1; box-shadow: 0 2px 8px rgba(224,74,60,.2); }
  .header-meta { font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .14em; }
  h1 { font-size: 22px; font-weight: 800; letter-spacing: -.02em; color: var(--text); line-height: 1.2; }
  .header-sub { color: var(--text-secondary); font-size: 13px; margin: 4px 0 14px; font-weight: 400; }

  .tabs { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { border: none; background: transparent; padding: 10px 14px; cursor: pointer; color: var(--text-dim); font-family: var(--sans); font-size: 13px; font-weight: 600; transition: all .15s; white-space: nowrap; border-bottom: 2px solid transparent; }
  .tab:hover { color: var(--text-secondary); }
  .tab.active { color: var(--red); border-bottom-color: var(--red); }

  .content { max-width: 920px; margin: 24px auto; padding: 0 28px 60px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .principle { border-radius: var(--radius); padding: 18px 20px; margin-bottom: 20px; border: 1px solid; }
  .principle .p-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .principle p { color: var(--text-secondary); font-size: 13px; line-height: 1.7; }
  .principle em { color: var(--text); font-style: normal; font-weight: 600; }

  .must-have { border-radius: var(--radius); padding: 16px 18px; margin-bottom: 20px; background: var(--red-light); border: 1px solid var(--red-border); }
  .mh-title { font-weight: 800; font-size: 14px; color: var(--red); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .04em; }
  .mh-row { padding: 10px 0; border-top: 1px solid var(--red-border); display: flex; gap: 10px; align-items: flex-start; }
  .mh-icon { font-size: 14px; flex-shrink: 0; margin-top: 2px; }
  .mh-row p { font-size: 13px; line-height: 1.7; color: var(--text-secondary); }

  .section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow-sm); }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; transition: background .15s; }
  .section-header:hover { background: var(--bg-warm); }
  .section-header.open { border-bottom: 1px solid var(--border); }
  .section-title { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; color: var(--text); }
  .section-icon { font-size: 15px; width: 26px; height: 26px; border-radius: 6px; background: var(--bg-warm); display: inline-flex; align-items: center; justify-content: center; }
  .chevron { font-size: 14px; transition: transform .2s; color: var(--text-dim); }
  .chevron.open { transform: rotate(180deg); }
  .section-body { padding: 18px; display: none; }
  .section-body.open { display: block; }

  .d-question { background: var(--amber-light); border: 1px solid var(--amber-border); border-radius: var(--radius-sm); padding: 12px 16px; }
  .d-question p { font-weight: 600; font-size: 13px; color: var(--amber); }
  .d-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0 16px; }
  .d-branch { border-radius: var(--radius-sm); padding: 14px 16px; border: 1px solid; }
  .d-branch.yes, .d-branch.no-y { background: var(--green-light); border-color: var(--green-border); }
  .d-branch.no, .d-branch.no-n { background: var(--red-light); border-color: var(--red-border); }
  .d-branch.no-p { background: var(--purple-light); border-color: var(--purple-border); }
  .d-branch.no-a { background: var(--amber-light); border-color: var(--amber-border); }
  .b-label { font-weight: 700; font-size: 12px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .03em; }
  .d-branch p { font-size: 12.5px; line-height: 1.6; color: var(--text-secondary); }

  .script { background: var(--blue-light); border: 1px solid var(--blue-border); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 8px; }
  .script-label { font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
  .script p { font-size: 12.5px; line-height: 1.7; color: var(--text-secondary); font-style: italic; }

  .tactic { background: var(--bg-warm); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 8px; }
  .t-title { font-weight: 700; font-size: 13px; color: var(--red); margin-bottom: 4px; }
  .tactic p { font-size: 12.5px; line-height: 1.7; color: var(--text-secondary); }

  .body-text { font-size: 13px; line-height: 1.7; color: var(--text-secondary); margin-bottom: 14px; }

  .sub-heading { font-weight: 700; font-size: 14px; margin: 18px 0 10px; }

  .cards-2, .cards-3 { display: grid; gap: 8px; margin-bottom: 12px; }
  .cards-2 { grid-template-columns: 1fr 1fr; }
  .cards-3 { grid-template-columns: 1fr 1fr 1fr; }
  .stat-card { border-radius: var(--radius-sm); padding: 14px 16px; border: 1px solid; }
  .sc-val { font-family: var(--mono); font-weight: 700; font-size: 22px; line-height: 1; margin-bottom: 4px; }
  .sc-label { font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: .03em; margin-bottom: 6px; }
  .sc-note { font-size: 12px; line-height: 1.6; color: var(--text-secondary); }

  .step-flow { display: flex; align-items: stretch; gap: 8px; margin-bottom: 16px; }
  .sf-step { flex: 1; border-radius: var(--radius-sm); padding: 14px 16px; border: 1px solid var(--border); background: var(--card); }
  .sf-step.active { border-color: var(--green-border); background: var(--green-light); }
  .sf-step.fallback { border-color: var(--amber-border); background: var(--amber-light); }
  .sf-step.escalate { border-color: var(--red-border); background: var(--red-light); }
  .sf-num { font-family: var(--mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .sf-text { font-weight: 700; font-size: 13px; color: var(--text); margin-bottom: 6px; }
  .sf-note { font-size: 11.5px; line-height: 1.6; color: var(--text-secondary); }
  .sf-arrow { display: flex; align-items: center; font-size: 18px; color: var(--text-dim); flex-shrink: 0; }

  .trade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .trade-item { border-radius: var(--radius-sm); padding: 12px 16px; border: 1px solid var(--border); background: var(--card); }
  .ti-label { font-weight: 700; font-size: 12px; margin-bottom: 4px; color: var(--text); }
  .ti-earn { font-size: 12px; line-height: 1.5; color: var(--text-secondary); }

  .never-list { display: flex; flex-direction: column; gap: 6px; }
  .n-item { display: flex; gap: 8px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border-light); }
  .n-icon { color: var(--red); font-weight: 700; flex-shrink: 0; }
  .n-text { font-size: 12.5px; line-height: 1.6; color: var(--text-secondary); }

  .esc-row { display: flex; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-light); }
  .esc-badge { font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 6px; white-space: nowrap; letter-spacing: .04em; border: 1px solid; }
  .esc-info { flex: 1; }
  .esc-trigger { font-weight: 700; font-size: 13px; color: var(--text); }
  .esc-who { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .code-block { background: var(--bg-warm); border-radius: var(--radius-sm); padding: 14px 16px; font-family: var(--mono); font-size: 12px; line-height: 2; color: var(--text-secondary); margin-bottom: 12px; }
  .code-block span { font-weight: 700; color: var(--text); }

  .waterfall { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; padding: 16px; background: var(--bg-warm); border-radius: var(--radius-sm); margin-bottom: 12px; }
  .wf-step { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; font-size: 12px; font-weight: 600; color: var(--text); }
  .wf-arrow { color: var(--text-dim); font-size: 14px; }

  table.tier-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 12px; }
  .tier-table th { background: var(--bg-warm); padding: 8px 10px; text-align: left; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-dim); border-bottom: 2px solid var(--border); }
  .tier-table td { padding: 10px; border-bottom: 1px solid var(--border-light); color: var(--text-secondary); }
  .tier-table tr.recommended { background: var(--purple-light); }
  .badge { font-family: var(--mono); font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 4px; letter-spacing: .06em; }

  .quarterly-box { background: var(--red-light); border: 1px solid var(--red-border); border-radius: var(--radius-sm); padding: 16px; }
  .qb-title { font-weight: 700; font-size: 13px; color: var(--red); margin-bottom: 10px; }
  .qb-stats { display: flex; gap: 16px; margin-bottom: 10px; }
  .qb-stat { flex: 1; }
  .qs-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim); margin-bottom: 2px; }
  .qs-val { font-family: var(--mono); font-weight: 700; font-size: 16px; color: var(--red); }
  .qb-note { font-size: 12px; line-height: 1.6; color: var(--text-secondary); }

  .loading { text-align: center; padding: 80px 20px; }
  .loading-spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { margin-top: 16px; color: var(--text-dim); font-size: 14px; }
  .error { text-align: center; padding: 60px 20px; color: var(--red); }
  .error h2 { margin-bottom: 8px; }
  .error p { color: var(--text-secondary); font-size: 14px; max-width: 500px; margin: 0 auto; }

  @media (max-width: 700px) {
    .cards-3 { grid-template-columns: 1fr; }
    .cards-2, .d-grid, .trade-grid { grid-template-columns: 1fr; }
    .step-flow { flex-direction: column; }
    .sf-arrow { transform: rotate(90deg); align-self: center; }
    .qb-stats { flex-direction: column; }
    .content { padding: 0 16px 40px; }
    .header { padding: 16px 16px 0; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">🍊</div>
    <div>
      <div class="header-meta">Momos · Sales Playbook · Internal Only</div>
      <h1>Pricing Defense Decision Tree</h1>
    </div>
  </div>
  <p class="header-sub">Hold price. Defend fees. Close without unnecessary concessions.</p>
  <div class="tabs" id="tabs"></div>
</div>

<div class="content" id="content">
  <div class="loading"><div class="loading-spinner"></div><p>Loading content from Google Sheets…</p></div>
</div>

<script>
// =====================================================================
// CONFIGURATION — UPDATE THIS URL WITH YOUR PUBLISHED GOOGLE SHEET
// =====================================================================
// Steps:
// 1. Import pricing_tree_content.csv into Google Sheets
// 2. File → Share → Publish to web → Select Sheet1 → CSV → Publish
// 3. Copy the URL and paste it below
// =====================================================================
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRJaprMHaCx6T3ouBZ8z4n9iKKAiT2TgwxrT_xrC7blbOvNnpktkoKcJAZivQ_qIdi9M_ykJZC37Mxz/pubhtml?gid=1755976303&single=true';
// =====================================================================

const COLOR_MAP = {
  red:    { bg: 'var(--red-light)',    border: 'var(--red-border)',    text: 'var(--red)' },
  green:  { bg: 'var(--green-light)',  border: 'var(--green-border)',  text: 'var(--green)' },
  amber:  { bg: 'var(--amber-light)',  border: 'var(--amber-border)',  text: 'var(--amber)' },
  blue:   { bg: 'var(--blue-light)',   border: 'var(--blue-border)',   text: 'var(--blue)' },
  purple: { bg: 'var(--purple-light)', border: 'var(--purple-border)', text: 'var(--purple)' },
  gray:   { bg: 'var(--bg)',           border: 'var(--border)',        text: 'var(--text-dim)' },
};

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function parseCSV(text) {
  const rows = []; let current = []; let field = ''; let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { current.push(field); field = ''; }
      else if (c === '\n' || (c === '\r' && text[i+1] === '\n')) {
        current.push(field); field = '';
        if (current.length > 1 || current[0] !== '') rows.push(current);
        current = [];
        if (c === '\r') i++;
      } else { field += c; }
    }
  }
  if (field || current.length) { current.push(field); rows.push(current); }
  return rows;
}

function buildFromData(rows) {
  const headers = rows[0].map(h => h.trim().toLowerCase());
  const data = rows.slice(1).map(r => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = (r[i] || '').trim());
    return obj;
  });

  // Group by tab
  const tabs = [];
  const tabMap = {};
  data.forEach(row => {
    if (!row.tab) return;
    if (!tabMap[row.tab]) { tabMap[row.tab] = []; tabs.push(row.tab); }
    tabMap[row.tab].push(row);
  });

  // Build tabs
  const tabsEl = document.getElementById('tabs');
  const contentEl = document.getElementById('content');
  tabsEl.innerHTML = '';
  contentEl.innerHTML = '';

  tabs.forEach((tabName, ti) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (ti === 0 ? ' active' : '');
    btn.textContent = tabName;
    btn.onclick = () => switchTab(tabName);
    tabsEl.appendChild(btn);

    const panel = document.createElement('div');
    panel.className = 'panel' + (ti === 0 ? ' active' : '');
    panel.id = 'panel-' + tabName.replace(/[^a-z0-9]/gi, '');

    const rows_ = tabMap[tabName];
    let currentSection = null;
    let sectionBody = null;
    let mustHaveBlock = null;

    rows_.forEach(row => {
      const type = row.type;
      const color = COLOR_MAP[row.color] || COLOR_MAP.gray;

      // Handle principle (tab-level intro box)
      if (row.section === '_principle') {
        const div = document.createElement('div');
        div.className = 'principle';
        div.style.background = COLOR_MAP.green.bg;
        div.style.borderColor = COLOR_MAP.green.border;
        div.innerHTML = `<div class="p-title" style="color:${COLOR_MAP.green.text}">${esc(row.label)}</div><p>${esc(row.text)}</p>`;
        panel.appendChild(div);
        return;
      }

      // Handle rules block (must-have)
      if (row.section === '_rules') {
        if (!mustHaveBlock) {
          mustHaveBlock = document.createElement('div');
          mustHaveBlock.className = 'must-have';
          mustHaveBlock.innerHTML = `<div class="mh-title">${esc(row.label)}</div>`;
          panel.appendChild(mustHaveBlock);
        }
        if (type === 'warning') {
          mustHaveBlock.innerHTML += `<div class="mh-row"><span class="mh-icon">⚠</span><p><strong>${esc(row.label)}</strong> ${esc(row.text)}</p></div>`;
        }
        return;
      }

      // New section detection
      if (row.section !== (currentSection || {}).name) {
        currentSection = { name: row.section };
        const sec = document.createElement('div');
        sec.className = 'section';
        const icon = rows_.find(r => r.section === row.section && r.icon)?.icon || '';
        sec.innerHTML = `<div class="section-header open" onclick="toggleSection(this)"><div class="section-title"><span class="section-icon">${icon}</span> ${esc(row.section)}</div><div class="chevron open">▾</div></div>`;
        sectionBody = document.createElement('div');
        sectionBody.className = 'section-body open';
        sec.appendChild(sectionBody);
        panel.appendChild(sec);
      }

      if (!sectionBody) return;

      // Render by type
      if (type === 'warning') {
        const c = COLOR_MAP[row.color] || COLOR_MAP.red;
        if (!sectionBody.querySelector('.must-have')) {
          const mh = document.createElement('div');
          mh.className = 'must-have';
          mh.innerHTML = `<div class="mh-title">Rules That Apply to Every Deal</div>`;
          sectionBody.insertBefore(mh, sectionBody.firstChild);
        }
        const mh = sectionBody.querySelector('.must-have');
        mh.innerHTML += `<div class="mh-row"><span class="mh-icon">⚠</span><p><strong>${esc(row.label)}</strong> ${esc(row.text)}</p></div>`;
      }
      else if (type === 'body') {
        sectionBody.innerHTML += `<p class="body-text">${esc(row.text || row.label)}</p>`;
      }
      else if (type === 'option') {
        if (!sectionBody.querySelector('.step-flow')) {
          sectionBody.innerHTML += `<div class="step-flow"></div>`;
        }
        const flow = sectionBody.querySelector('.step-flow');
        const cls = row.color === 'green' ? 'active' : row.color === 'amber' ? 'fallback' : 'escalate';
        if (flow.children.length > 0) flow.innerHTML += `<div class="sf-arrow">→</div>`;
        flow.innerHTML += `<div class="sf-step ${cls}"><div class="sf-num" style="color:${color.text}">${esc(row.label)}</div><div class="sf-text">${esc(row.value)}</div><div class="sf-note">${esc(row.text)}</div></div>`;
      }
      else if (type === 'stat') {
        if (!sectionBody.querySelector('.cards-collector')) {
          const c = document.createElement('div');
          c.className = 'cards-collector cards-3';
          sectionBody.appendChild(c);
        }
        const cards = sectionBody.querySelector('.cards-collector:last-of-type') || sectionBody.querySelector('.cards-collector');
        // After a subheading or other non-stat, start a new cards block
        const lastChild = sectionBody.lastElementChild;
        let targetCards;
        if (lastChild && lastChild.classList.contains('cards-collector')) {
          targetCards = lastChild;
        } else {
          targetCards = document.createElement('div');
          targetCards.className = 'cards-collector cards-3';
          sectionBody.appendChild(targetCards);
        }
        targetCards.innerHTML += `<div class="stat-card" style="background:${color.bg};border-color:${color.border}"><div class="sc-val" style="color:${color.text}">${esc(row.value)}</div><div class="sc-label">${esc(row.label)}</div><div class="sc-note">${esc(row.text)}</div></div>`;
      }
      else if (type === 'script') {
        sectionBody.innerHTML += `<div class="script"><div class="script-label">${esc(row.label)}</div><p>"${esc(row.text)}"</p></div>`;
      }
      else if (type === 'tactic') {
        sectionBody.innerHTML += `<div class="tactic"><div class="t-title">${esc(row.label)}</div><p>${esc(row.text)}</p></div>`;
      }
      else if (type === 'decision') {
        sectionBody.innerHTML += `<div class="d-question" style="margin-top:16px"><p>${esc(row.value || row.text)}</p></div><div class="d-grid"></div>`;
      }
      else if (type === 'branch') {
        const grids = sectionBody.querySelectorAll('.d-grid');
        const grid = grids[grids.length - 1];
        if (grid) {
          const branchColor = row.color === 'green' ? 'yes' : row.color === 'red' ? 'no' : row.color === 'purple' ? 'no-p' : 'no-y';
          grid.innerHTML += `<div class="d-branch ${branchColor}"><div class="b-label" style="color:${color.text}">${esc(row.label)}</div><p>${esc(row.text)}</p></div>`;
        }
      }
      else if (type === 'subheading') {
        sectionBody.innerHTML += `<div class="sub-heading" style="color:${color.text}">${esc(row.label)}</div>`;
      }
      else if (type === 'trade') {
        if (!sectionBody.querySelector('.trade-grid')) {
          sectionBody.innerHTML += `<div class="trade-grid"></div>`;
        }
        const tg = sectionBody.querySelector('.trade-grid');
        tg.innerHTML += `<div class="trade-item"><div class="ti-label">${esc(row.label)}</div><div class="ti-earn">${esc(row.text)}</div></div>`;
      }
      else if (type === 'never') {
        if (!sectionBody.querySelector('.never-list')) {
          sectionBody.innerHTML += `<div class="never-list"></div>`;
        }
        const nl = sectionBody.querySelector('.never-list');
        nl.innerHTML += `<div class="n-item"><span class="n-icon">✗</span><span class="n-text">${esc(row.value || row.text)}</span></div>`;
      }
      else if (type === 'approval') {
        const c = COLOR_MAP[row.color] || COLOR_MAP.green;
        sectionBody.innerHTML += `<div class="esc-row"><div class="esc-badge" style="background:${c.bg};color:${c.text};border-color:${c.border}">${esc(row.label)}</div><div class="esc-info"><div class="esc-trigger">${esc(row.value)}</div><div class="esc-who">${esc(row.text)}</div></div></div>`;
      }
      else if (type === 'briefing') {
        const parts = (row.text || '').split(' | ');
        let html = '<div class="code-block">';
        parts.forEach(p => {
          const [k, ...v] = p.split(': ');
          html += `<span>${esc(k)}:</span> ${esc(v.join(': '))}<br>`;
        });
        html += '</div>';
        sectionBody.innerHTML += html;
      }
      else if (type === 'csm_table') {
        const tiers = (row.text || '').split(';');
        let html = `<table class="tier-table"><thead><tr><th>Tier</th><th>Monthly</th><th>CSM Type</th><th>Hours</th><th>Cadence</th><th>SLA</th><th>Status</th></tr></thead><tbody>`;
        const statusColors = { INCLUDED: 'green', UPSELL: 'blue', 'TARGET TIER': 'purple', STRATEGIC: 'amber' };
        tiers.forEach(t => {
          const cols = t.trim().split('|');
          if (cols.length < 7) return;
          const sc = statusColors[cols[6].trim()] || 'gray';
          const c = COLOR_MAP[sc];
          const cls = cols[6].trim() === 'TARGET TIER' ? ' class="recommended"' : '';
          html += `<tr${cls}><td><strong>${esc(cols[0].trim())}</strong></td><td>${esc(cols[1].trim())}</td><td>${esc(cols[2].trim())}</td><td>${esc(cols[3].trim())}</td><td>${esc(cols[4].trim())}</td><td>${esc(cols[5].trim())}</td><td><span class="badge" style="background:${c.bg};color:${c.text};border:1px solid ${c.border}">${esc(cols[6].trim())}</span></td></tr>`;
        });
        html += `</tbody></table>`;
        sectionBody.innerHTML += html;
      }
    });

    contentEl.appendChild(panel);
  });
}

function switchTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent === tabName));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const id = 'panel-' + tabName.replace(/[^a-z0-9]/gi, '');
  const panel = document.getElementById(id);
  if (panel) panel.classList.add('active');
}

function toggleSection(el) {
  el.classList.toggle('open');
  el.querySelector('.chevron').classList.toggle('open');
  const body = el.nextElementSibling;
  if (body) body.classList.toggle('open');
}

// Fetch and render
async function init() {
  try {
    if (SHEET_CSV_URL.includes('__PASTE_')) {
      // Fallback: load from embedded data or show instructions
      document.getElementById('content').innerHTML = `
        <div class="error">
          <h2>Setup Required</h2>
          <p>To connect this page to your Google Sheet:<br><br>
          1. Import <strong>pricing_tree_content.csv</strong> into Google Sheets<br>
          2. Go to File → Share → Publish to web<br>
          3. Select your sheet → CSV format → Publish<br>
          4. Copy the published URL<br>
          5. Open this HTML file and replace <code>https://docs.google.com/spreadsheets/d/e/2PACX-1vRJaprMHaCx6T3ouBZ8z4n9iKKAiT2TgwxrT_xrC7blbOvNnpktkoKcJAZivQ_qIdi9M_ykJZC37Mxz/pubhtml?gid=1755976303&single=true</code> with your URL<br><br>
          The page will then load content live from the sheet on every visit.</p>
        </div>`;
      return;
    }

    const resp = await fetch(SHEET_CSV_URL);
    if (!resp.ok) throw new Error('Failed to fetch sheet');
    const text = await resp.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('Sheet appears empty');
    buildFromData(rows);
  } catch (err) {
    document.getElementById('content').innerHTML = `
      <div class="error">
        <h2>Could not load content</h2>
        <p>${esc(err.message)}. Make sure the Google Sheet is published to web as CSV and the URL is correct.</p>
      </div>`;
  }
}

init();
</script>
</body>
</html>
